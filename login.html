<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | APK Manager</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<!-- Header -->
<header class="site-header">
    <div class="container nav-inner">
        <a href="index.html" class="logo">APK<span>Manager</span></a>
        <button class="hamburger" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="apks.html">APKs</a>
            <a href="softwares.html">Softwares</a>
            <a href="blog.html">Blog</a>
            <a href="login.html">Login</a>
            <a href="register.html">Register</a>
        </nav>
    </div>
    <div class="nav-overlay"></div>
</header>

<!-- Main Content -->
<main>
    <div class="container">
        <div class="form-page">
            <div class="form-card fade-in">
                <h1>🔑 Login</h1>
                <form>
                    <table style="width: 100%; margin-bottom: var(--gap-lg);">
                        <tr>
                            <th><label style="color: var(--text-secondary); font-size: 0.95rem;">Username:</label></th>
                            <td><input type="text" name="username" required style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-primary); margin-bottom: 12px;"></td>
                        </tr>
                        <tr>
                            <th><label style="color: var(--text-secondary); font-size: 0.95rem;">Password:</label></th>
                            <td><input type="password" name="password" required style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-primary);"></td>
                        </tr>
                    </table>
                    <button type="button" class="btn-primary" style="width: 100%;">Login</button>
                </form>
                <div class="form-footer">
                    <p>Don't have an account? <a href="register.html">Register</a></p>
                    <p><a href="#">Forgot Password?</a></p>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Footer -->
<footer class="site-footer">
    <div class="container footer-content">
        <div class="footer-links">
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
        </div>
        <p class="footer-copy">&copy; 2026 APK Manager. All rights reserved.</p>
    </div>
</footer>

<script src="./js/main.js"></script>
</body>
</html>
